<!DOCTYPE html>
<html lang="fr">
<head>
    <title>AllDrawIO</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h1>AllDraw.IO</h1>
            <input type="text" id="username" placeholder="Type your username" maxlength="15">
                <div class='login-content'>
                    <div class="room-selection">
                        <input type="text" id="room" placeholder="Type the room name">
                        <input type="password" id="password" placeholder="Type the room password (optional)">
                        <button id="joinBtn">Create/Join the room</button>
                    </div>

                    <div class="available-rooms">
                        <h3>Available rooms:</h3>
                        <div class="roomListContainer">
                            <ul id="roomsList">
                                <li>No active room</li>
                            </ul>
                        </div>
                    </div>
                </div>
        </div>
    </div>
    <div id="fab-toolbar" class="fab-toolbar closed">
        
        <div class="fab-trigger" id="fabTrigger">
           <img src="img/Toolbox.svg" alt="Toolbox" class="fab-icon">
        </div>

        <div class="fab-options">
        
            <button id="penBtn" class="tool-btn active" title="Crayon">✏️</button>
            
            <button id="eraserBtn" class="tool-btn" title="Gomme">🧼</button>
            
            <div class="separator"></div>

            <input type="color" id="colorPicker" value="#000000" class="color-tool">
            
            <div class="slider-container">
                <button id="sizeBtn" class="tool-btn" title="Taille">🎚️</button>
                <div id="sizeValue">
                    <input type="range" id="sizePicker" min="1" max="20" value="5">
                </div>
            </div>

            <button id="eraseAllBtn" class="tool-btn" title="Effacer tout">🗑️</button>

            <button id="resetZoom" class="tool-btn" title="Réinitialiser le zoom">🔍</button>
            <button id="exportBtn" class="tool-btn" title="Exporter en PNG">💾</button>
        </div>
    </div>
    <div id="zoomPourcent" class="zoomPourcent">
        100%
    </div>
    <div id="ClientCompteur" class="ClientCompteur">
        0 👀
    </div>
    <canvas id="whiteboard"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
</body>
</html>
